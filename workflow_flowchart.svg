<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1620" font-family="'Segoe UI', Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#475569"/></marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#d97706"/></marker>
    <marker id="arrowRail" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
    <marker id="arrowPass" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/></marker>
  </defs>

  <rect x="0" y="0" width="1440" height="1620" fill="#f8fafc"/>
  <text x="720" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Agentic Interview Question Generator — Workflow</text>
  <text x="720" y="70" text-anchor="middle" font-size="14" fill="#64748b">Single agent with 11 tools · knowledge graph · TF-IDF question bank · quality gate · human review · RLHF feedback</text>

  <!-- ===================== SIDE RAILS ===================== -->
  <!-- KNOWLEDGE BASE (left) -->
  <rect x="34" y="200" width="216" height="520" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="142" y="232" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">KNOWLEDGE BASE</text>
  <text x="142" y="252" text-anchor="middle" font-size="11" fill="#15803d">(pre-prepared JSON files)</text>
  <line x1="50" y1="266" x2="234" y2="266" stroke="#bbf7d0" stroke-width="1"/>
  <text x="50" y="292" font-size="12" fill="#14532d">interview_questions.json</text>
  <text x="50" y="310" font-size="10.5" fill="#166534">3,133 filtered questions</text>
  <line x1="50" y1="324" x2="234" y2="324" stroke="#bbf7d0" stroke-width="1"/>
  <text x="50" y="348" font-size="12" fill="#14532d">knowledge_graph.json</text>
  <text x="50" y="366" font-size="10.5" fill="#166534">106 KPs + 45 sessions + DAG</text>
  <line x1="50" y1="380" x2="234" y2="380" stroke="#bbf7d0" stroke-width="1"/>
  <text x="50" y="404" font-size="12" fill="#14532d">scraped_questions.json</text>
  <text x="50" y="422" font-size="10.5" fill="#166534">115 Qs from 10 curated URLs</text>
  <line x1="50" y1="436" x2="234" y2="436" stroke="#bbf7d0" stroke-width="1"/>
  <text x="50" y="460" font-size="12" fill="#14532d">Reading Materials (.md)</text>
  <text x="50" y="478" font-size="10.5" fill="#166534">45 session contents</text>
  <line x1="50" y1="492" x2="234" y2="492" stroke="#bbf7d0" stroke-width="1"/>
  <text x="50" y="516" font-size="12" fill="#14532d">Curriculum KP JSONs</text>
  <text x="50" y="534" font-size="10.5" fill="#166534">1,819 Qs with KP mappings</text>
  <line x1="50" y1="548" x2="234" y2="548" stroke="#bbf7d0" stroke-width="1"/>
  <text x="142" y="576" text-anchor="middle" font-size="11" fill="#15803d">TF-IDF index at startup</text>
  <text x="142" y="594" text-anchor="middle" font-size="11" fill="#15803d">3,248 searchable questions</text>

  <!-- MEMORY + EVAL (right) -->
  <rect x="1190" y="200" width="216" height="520" rx="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="1298" y="232" text-anchor="middle" font-size="16" font-weight="700" fill="#6d28d9">MEMORY + EVAL</text>
  <text x="1298" y="252" text-anchor="middle" font-size="11" fill="#7c3aed">(SQLite + JSON)</text>
  <line x1="1206" y1="266" x2="1390" y2="266" stroke="#ddd6fe" stroke-width="1"/>
  <text x="1206" y="290" font-size="12" fill="#5b21b6">SQLite (memory.db)</text>
  <text x="1206" y="310" font-size="10.5" fill="#7c3aed">  session resolution cache</text>
  <text x="1206" y="328" font-size="10.5" fill="#7c3aed">  run history</text>
  <text x="1206" y="346" font-size="10.5" fill="#7c3aed">  RLHF feedback</text>
  <text x="1206" y="364" font-size="10.5" fill="#7c3aed">  suppress / boost lists</text>
  <line x1="1206" y1="380" x2="1390" y2="380" stroke="#ddd6fe" stroke-width="1"/>
  <text x="1206" y="404" font-size="12" fill="#5b21b6">Eval Sets (eval_sets.json)</text>
  <text x="1206" y="424" font-size="10.5" fill="#7c3aed">  46 sessions covered</text>
  <text x="1206" y="442" font-size="10.5" fill="#7c3aed">  122 good theory Qs</text>
  <text x="1206" y="460" font-size="10.5" fill="#7c3aed">  72 good coding Qs</text>
  <text x="1206" y="478" font-size="10.5" fill="#7c3aed">  148 bad Qs (off-topic,</text>
  <text x="1206" y="496" font-size="10.5" fill="#7c3aed">    wrong format, etc.)</text>
  <line x1="1206" y1="512" x2="1390" y2="512" stroke="#ddd6fe" stroke-width="1"/>
  <text x="1298" y="540" text-anchor="middle" font-size="11" fill="#7c3aed">Format rules for coding Qs</text>
  <text x="1298" y="558" text-anchor="middle" font-size="11" fill="#7c3aed">(Nxtmock portal format)</text>

  <!-- ===================== RAIL CONNECTORS ===================== -->
  <path d="M250,350 C 370,350 400,260 520,260" stroke="#94a3b8" stroke-width="1.2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowRail)"/>
  <text x="330" y="290" font-size="10.5" fill="#94a3b8">KG lookup</text>
  <path d="M250,460 L420,500" stroke="#94a3b8" stroke-width="1.2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowRail)"/>
  <text x="280" y="500" font-size="10.5" fill="#94a3b8">TF-IDF search</text>
  <path d="M1190,310 L940,260" stroke="#94a3b8" stroke-width="1.2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowRail)"/>
  <text x="1020" y="276" font-size="10.5" fill="#94a3b8">cache</text>
  <path d="M520,1380 C 300,1380 250,900 250,700" stroke="#94a3b8" stroke-width="1.2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowRail)"/>
  <text x="230" y="1050" font-size="10.5" fill="#94a3b8">RLHF write</text>

  <!-- ===================== MAIN SPINE EDGES ===================== -->
  <path d="M720,160 L720,210" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M720,290 L720,340" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M720,420 L720,470" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="734" y="452" font-size="11" fill="#64748b">KP labels as queries</text>
  <path d="M720,550 L720,600" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="734" y="582" font-size="11" fill="#64748b">if bank has gaps</text>
  <path d="M720,680 L720,730" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M720,810 L720,860" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="734" y="842" font-size="11" fill="#64748b">if code_heavy / mixed</text>
  <path d="M720,940 L720,990" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M720,1070 L720,1120" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M720,1200 L720,1250" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M720,1330 L720,1380" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M720,1440 L720,1490" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

  <!-- ===================== LOOPS ===================== -->
  <!-- Quality gate fail → re-curate -->
  <path d="M500,1170 C 380,1170 380,500 420,500" stroke="#d97706" stroke-width="1.7" fill="none" stroke-dasharray="5,4" marker-end="url(#arrowLoop)"/>
  <text x="320" y="840" font-size="11" fill="#b45309" font-weight="600">critique fail</text>
  <text x="320" y="856" font-size="11" fill="#b45309" font-weight="600">→ revise</text>
  <text x="320" y="872" font-size="11" fill="#b45309" font-weight="600">(max 2 rounds)</text>

  <!-- Human reject → re-generate -->
  <path d="M940,1290 C 1100,1290 1100,160 920,160" stroke="#d97706" stroke-width="1.7" fill="none" stroke-dasharray="5,4" marker-end="url(#arrowLoop)"/>
  <text x="1040" y="720" font-size="11" fill="#b45309" font-weight="600">reject →</text>
  <text x="1040" y="736" font-size="11" fill="#b45309" font-weight="600">re-generate</text>
  <text x="1040" y="752" font-size="11" fill="#b45309" font-weight="600">fresh run</text>

  <!-- Pass skips human review when quality is high -->
  <path d="M500,1060 C 400,1060 400,1390 520,1390" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arrowPass)"/>
  <text x="370" y="1220" font-size="11" fill="#15803d" font-weight="700">pass (auto)</text>

  <!-- ===================== NODES ===================== -->
  <!-- Input -->
  <rect x="520" y="100" width="400" height="60" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="720" y="126" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1e3a8a">User Input — Flask Web UI</text>
  <text x="720" y="146" text-anchor="middle" font-size="11.5" fill="#1d4ed8">select session(s) + config (max questions, difficulty) + generate</text>

  <!-- Step 1: understand_session -->
  <rect x="520" y="210" width="400" height="80" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="720" y="236" text-anchor="middle" font-size="14.5" font-weight="700" fill="#5b21b6">Step 1 · understand_session</text>
  <text x="720" y="256" text-anchor="middle" font-size="11.5" fill="#6d28d9">knowledge_graph.json → SessionContext (instant, no LLM)</text>
  <text x="720" y="274" text-anchor="middle" font-size="11.5" fill="#6d28d9">learning outcomes · KP IDs · session type · scope boundaries</text>

  <!-- Step 2: search_question_bank -->
  <rect x="520" y="340" width="400" height="80" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="720" y="366" text-anchor="middle" font-size="14.5" font-weight="700" fill="#5b21b6">Step 2 · search_question_bank (x3-5)</text>
  <text x="720" y="386" text-anchor="middle" font-size="11.5" fill="#6d28d9">TF-IDF cosine similarity over 3,248 pre-indexed questions</text>
  <text x="720" y="404" text-anchor="middle" font-size="11.5" fill="#6d28d9">post-filter by session scope keywords · no LLM needed</text>

  <!-- Step 3: generate_interview_questions -->
  <rect x="520" y="470" width="400" height="80" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="720" y="496" text-anchor="middle" font-size="14.5" font-weight="700" fill="#5b21b6">Step 3 · generate_interview_questions</text>
  <text x="720" y="516" text-anchor="middle" font-size="11.5" fill="#6d28d9">LLM generates theory Qs from learning outcomes</text>
  <text x="720" y="534" text-anchor="middle" font-size="11.5" fill="#6d28d9">only when question bank has insufficient matches</text>

  <!-- Step 4: validate_relevance -->
  <rect x="520" y="600" width="400" height="80" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
  <text x="720" y="626" text-anchor="middle" font-size="14.5" font-weight="700" fill="#166534">Step 4 · validate_relevance</text>
  <text x="720" y="646" text-anchor="middle" font-size="11.5" fill="#15803d">LLM checks EVERY question against session outcomes</text>
  <text x="720" y="664" text-anchor="middle" font-size="11.5" fill="#15803d">removes off-topic questions automatically (temp=0.0)</text>

  <!-- Step 5: generate_coding_questions -->
  <rect x="520" y="730" width="400" height="80" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="720" y="756" text-anchor="middle" font-size="14.5" font-weight="700" fill="#5b21b6">Step 5 · generate_coding_questions</text>
  <text x="720" y="776" text-anchor="middle" font-size="11.5" fill="#6d28d9">Nxtmock portal format: concise content + CodeSnippet</text>
  <text x="720" y="794" text-anchor="middle" font-size="11.5" fill="#6d28d9">category: {LANG}_CODING · starter code with function signature</text>

  <!-- Step 6: Quality tools -->
  <rect x="420" y="860" width="600" height="80" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="720" y="886" text-anchor="middle" font-size="14.5" font-weight="700" fill="#334155">Step 6 · Quality Checks (code-only, no LLM)</text>
  <text x="720" y="906" text-anchor="middle" font-size="11.5" fill="#475569">check_difficulty_balance (30/50/20) · check_outcome_coverage · deduplicate_questions (TF-IDF 0.85)</text>
  <text x="720" y="924" text-anchor="middle" font-size="11.5" fill="#475569">generate_expected_answers (LLM) · remove_question</text>

  <!-- Step 7: submit + quality gate -->
  <rect x="500" y="990" width="440" height="80" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
  <text x="720" y="1016" text-anchor="middle" font-size="14.5" font-weight="700" fill="#166534">Step 7 · submit_question_set → Quality Gate</text>
  <text x="720" y="1036" text-anchor="middle" font-size="11.5" fill="#15803d">LLM critique (temp=0.0): relevance + difficulty + duplicates + count</text>
  <text x="720" y="1054" text-anchor="middle" font-size="11.5" fill="#15803d">pass → proceed · fail → must_fix list → agent revises (max 2 rounds)</text>

  <!-- Live Progress -->
  <rect x="520" y="1120" width="400" height="80" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="720" y="1146" text-anchor="middle" font-size="14.5" font-weight="700" fill="#334155">Live Progress — SSE Stream</text>
  <text x="720" y="1166" text-anchor="middle" font-size="11.5" fill="#475569">each tool call → real-time event to browser via Server-Sent Events</text>
  <text x="720" y="1184" text-anchor="middle" font-size="11.5" fill="#475569">dark-themed progress page with tool name + status + summary</text>

  <!-- Human Review -->
  <rect x="500" y="1250" width="440" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.8"/>
  <text x="720" y="1274" text-anchor="middle" font-size="14.5" font-weight="700" fill="#92400e">HUMAN-IN-LOOP · Per-Question Review</text>
  <text x="720" y="1294" text-anchor="middle" font-size="11.5" fill="#b45309">accept / reject each question with feedback · difficulty + source tags</text>
  <text x="720" y="1314" text-anchor="middle" font-size="11.5" fill="#b45309">approve → export    ·    reject → re-generate with same sessions</text>

  <!-- Google Sheets -->
  <rect x="520" y="1380" width="400" height="60" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.6"/>
  <text x="720" y="1404" text-anchor="middle" font-size="14.5" font-weight="700" fill="#6d28d9">Memory Write-Back + Google Sheets Export</text>
  <text x="720" y="1424" text-anchor="middle" font-size="11.5" fill="#7c3aed">save run history + RLHF feedback → SQLite · write approved Qs → Sheets</text>

  <!-- Output -->
  <rect x="540" y="1490" width="360" height="62" rx="10" fill="#064e3b" stroke="#065f46" stroke-width="1.5"/>
  <text x="720" y="1516" text-anchor="middle" font-size="15" font-weight="700" fill="#ecfdf5">Google Sheet: QuestionDetails + CodingQuestion</text>
  <text x="720" y="1536" text-anchor="middle" font-size="11.5" fill="#a7f3d0">+ CodeSnippet tab · feedback dropdowns for RLHF</text>

  <!-- ===================== LEGEND ===================== -->
  <g transform="translate(40,1100)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#334155">Legend</text>
    <rect x="0" y="14" width="16" height="12" rx="3" fill="#dbeafe" stroke="#3b82f6"/><text x="22" y="24" font-size="11" fill="#334155">User input</text>
    <rect x="0" y="34" width="16" height="12" rx="3" fill="#ede9fe" stroke="#7c3aed"/><text x="22" y="44" font-size="11" fill="#334155">LLM agent tool (tool_use)</text>
    <rect x="0" y="54" width="16" height="12" rx="3" fill="#e2e8f0" stroke="#64748b"/><text x="22" y="64" font-size="11" fill="#334155">Code-only (no LLM)</text>
    <rect x="0" y="74" width="16" height="12" rx="3" fill="#dcfce7" stroke="#16a34a"/><text x="22" y="84" font-size="11" fill="#334155">Quality gate / validation</text>
    <rect x="0" y="94" width="16" height="12" rx="3" fill="#fef3c7" stroke="#d97706"/><text x="22" y="104" font-size="11" fill="#334155">Human-in-loop review</text>
    <rect x="0" y="114" width="16" height="12" rx="3" fill="#064e3b" stroke="#065f46"/><text x="22" y="124" font-size="11" fill="#334155">Output</text>
    <line x1="2" y1="140" x2="18" y2="140" stroke="#d97706" stroke-width="1.7" stroke-dasharray="5,4"/><text x="22" y="144" font-size="11" fill="#334155">Loop-back (retry / reject)</text>
    <line x1="2" y1="160" x2="18" y2="160" stroke="#16a34a" stroke-width="1.8"/><text x="22" y="164" font-size="11" fill="#334155">Pass (auto-approve)</text>
    <line x1="2" y1="180" x2="18" y2="180" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,4"/><text x="22" y="184" font-size="11" fill="#334155">Data read / write</text>
  </g>

  <!-- ===================== BUDGET BOX ===================== -->
  <rect x="1190" y="780" width="216" height="120" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="1298" y="808" text-anchor="middle" font-size="13" font-weight="700" fill="#854d0e">AGENT BUDGET</text>
  <line x1="1206" y1="818" x2="1390" y2="818" stroke="#fde68a" stroke-width="1"/>
  <text x="1206" y="840" font-size="11.5" fill="#92400e">Max 20 tool calls / run</text>
  <text x="1206" y="860" font-size="11.5" fill="#92400e">Typical: 10-14 calls</text>
  <text x="1206" y="880" font-size="11.5" fill="#92400e">Max 2 revision rounds</text>
</svg>
